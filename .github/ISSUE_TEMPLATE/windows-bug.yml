name: Windows bug report
description: Report a Windows-specific issue with diagnostics attached.
title: "[Windows] "
labels:
  - bug
  - windows
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: 1.0.0+1
    validations:
      required: true

  - type: dropdown
    id: windows_version
    attributes:
      label: Windows version
      options:
        - Windows 10
        - Windows 11
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - x64
        - arm64
    validations:
      required: true

  - type: input
    id: display_scaling
    attributes:
      label: Display scaling
      placeholder: 100% / 125% / 150% / 200%

  - type: input
    id: locale
    attributes:
      label: Locale
      placeholder: en-US

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Provide step-by-step instructions.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Export diagnostics from Settings → Diagnostics → Export diagnostics and attach diagnostics.json.
    validations:
      required: true

