name: Windows Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: windows-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2019
          - windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .ci-logs -Force | Out-Null
          flutter analyze *>&1 | Tee-Object -FilePath .ci-logs/analyze.log

      - name: Unit and widget tests
        shell: pwsh
        run: flutter test *>&1 | Tee-Object -FilePath .ci-logs/unit-widget-tests.log

      - name: Integration tests (Windows)
        shell: pwsh
        run: flutter test -d windows integration_test -- --timeout=45m *>&1 | Tee-Object -FilePath .ci-logs/integration-tests.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-logs-${{ matrix.os }}
          path: .ci-logs/
          retention-days: 14
