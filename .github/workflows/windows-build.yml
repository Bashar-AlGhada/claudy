name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define=OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/claudy-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: claudy-android-apk
          path: build/app/outputs/flutter-apk/claudy-android.apk
          retention-days: 14

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build Windows (x64)
        run: flutter build windows --release

      - name: Zip Windows build
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath claudy-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: claudy-windows-x64
          path: claudy-windows.zip
          retention-days: 14
